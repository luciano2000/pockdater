name: Publish Legacy

on:
  release:
    types: [published]

jobs:
  release:
    name: Release
    strategy:
      matrix:
        kind: ['macOS']
        include:
          - kind: macOS
            os: macos-latest
            target: osx
            arm: true
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v1

      - name: Setup dotnet
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 9.0.100

      - name: Build
        shell: bash
        run: |
          tag=$(git describe --tags --abbrev=0)
          release_name="App-$tag-${{ matrix.target }}"
          trim="True"

          # Build everything
          dotnet publish pockdater_legacy.csproj -r ${{ matrix.target }}-x64 --self-contained true -c Release -o "$release_name" --consoleloggerparameters:ErrorsOnly -p:PublishTrimmed=$trim -p:TrimMode=partial
          mv ${release_name}/pockdater_legacy ${release_name}/pockdater_x64
          dotnet publish pockdater_legacy.csproj -r ${{ matrix.target }}-arm64 --self-contained true -c Release -o "$release_name" --consoleloggerparameters:ErrorsOnly -p:PublishTrimmed=$trim -p:TrimMode=partial
          mv ${release_name}/pockdater_legacy ${release_name}/pockdater_arm64

          # Pack files
          cd $release_name
          lipo -create -output pockdater pockdater_arm64 pockdater_x64
          rm pockdater_arm64
          rm pockdater_x64
          zip "../dotnet7_pockdater_mac.zip" "pockdater"; cd ..;

          # Delete output directory
          rm -r "$release_name"

      - name: Publish Legacy
        uses: softprops/action-gh-release@v1
        with:
          files: "dotnet7*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.API_TOKEN }}
